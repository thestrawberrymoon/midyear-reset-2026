<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STRAWBERRY MOON — V3 Peach Sunrise</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Josefin+Sans:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#1a0a00;display:flex;align-items:center;justify-content:center}

.stage{
  position:relative;
  width:min(100vw,177.78vh);
  height:min(56.25vw,100vh);
  overflow:hidden;
}

/* ── Sky ── */
.sky{
  position:absolute;inset:0;
  background:linear-gradient(175deg,
    #ffecd2 0%,
    #fcb69f 20%,
    #ff9a9e 45%,
    #fecfef 70%,
    #ffeaa7 90%,
    #fff 100%);
  animation:skyShift 6s ease-in-out infinite alternate;
}
@keyframes skyShift{
  0%{filter:brightness(1) saturate(1)}
  100%{filter:brightness(1.06) saturate(1.1)}
}

/* ── Sun/Moon ── */
.moon-wrap{
  position:absolute;
  bottom:20%;left:50%;
  transform:translateX(-50%);
  width:20%;aspect-ratio:1;
  animation:moonRise 2.5s cubic-bezier(.2,.8,.2,1) .5s both;
}
@keyframes moonRise{
  from{transform:translateX(-50%) translateY(60%);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}

.moon-rays{
  position:absolute;inset:-50%;
  border-radius:50%;
  background:conic-gradient(
    from 0deg,
    transparent 0deg, rgba(255,220,150,.4) 5deg, transparent 10deg,
    transparent 20deg, rgba(255,200,120,.3) 25deg, transparent 30deg,
    transparent 40deg, rgba(255,220,150,.4) 45deg, transparent 50deg,
    transparent 60deg, rgba(255,200,120,.3) 65deg, transparent 70deg,
    transparent 80deg, rgba(255,220,150,.4) 85deg, transparent 90deg,
    transparent 100deg, rgba(255,200,120,.3) 105deg, transparent 110deg,
    transparent 120deg, rgba(255,220,150,.4) 125deg, transparent 130deg,
    transparent 140deg, rgba(255,200,120,.3) 145deg, transparent 150deg,
    transparent 160deg, rgba(255,220,150,.4) 165deg, transparent 170deg,
    transparent 180deg, rgba(255,200,120,.3) 185deg, transparent 190deg,
    transparent 200deg, rgba(255,220,150,.4) 205deg, transparent 210deg,
    transparent 220deg, rgba(255,200,120,.3) 225deg, transparent 230deg,
    transparent 240deg, rgba(255,220,150,.4) 245deg, transparent 250deg,
    transparent 260deg, rgba(255,200,120,.3) 265deg, transparent 270deg,
    transparent 280deg, rgba(255,220,150,.4) 285deg, transparent 290deg,
    transparent 300deg, rgba(255,200,120,.3) 305deg, transparent 310deg,
    transparent 320deg, rgba(255,220,150,.4) 325deg, transparent 330deg,
    transparent 340deg, rgba(255,200,120,.3) 345deg, transparent 350deg,
    transparent 360deg
  );
  animation:raysRotate 20s linear infinite;
  filter:blur(4px);
}
@keyframes raysRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.moon-glow{
  position:absolute;inset:-40%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,200,120,.6) 0%,rgba(255,160,100,.3) 40%,transparent 70%);
  filter:blur(10px);
  animation:glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.15);opacity:1}}

.moon-body{
  position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#fff8e8 0%,#ffe0a0 30%,#ffb870 60%,#ff8c42 85%,#e86020 100%);
  box-shadow:
    inset -6px -8px 20px rgba(200,80,20,.4),
    inset 5px 6px 15px rgba(255,255,220,.6),
    0 0 40px 20px rgba(255,160,80,.5),
    0 0 80px 40px rgba(255,120,60,.25);
}

/* ── Horizon glow ── */
.horizon{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(0deg,rgba(255,180,100,.5) 0%,rgba(255,200,150,.3) 40%,transparent 100%);
  filter:blur(25px);
}

/* ── Silhouette hills ── */
.hills{
  position:absolute;bottom:0;left:0;right:0;
  height:30%;
}
.hills svg{width:100%;height:100%}

/* ── Floating particles ── */
.particle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,220,180,.8);
  animation:particleFloat ease-in-out infinite;
  box-shadow:0 0 6px 2px rgba(255,200,150,.5);
}
@keyframes particleFloat{
  0%,100%{transform:translateY(0) scale(1);opacity:.6}
  50%{transform:translateY(-15px) scale(1.2);opacity:1}
}

/* ── Clouds ── */
.cloud{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,.85) 0%,rgba(255,230,200,.5) 50%,transparent 80%);
  filter:blur(10px);
  animation:cloudDrift linear infinite;
}
@keyframes cloudDrift{from{transform:translateX(-20%)}to{transform:translateX(110%)}}

/* ── Grain ── */
.grain{
  position:absolute;inset:0;pointer-events:none;
  opacity:.08;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.5'/></svg>");
  animation:grainMove .7s steps(3) infinite;
}
@keyframes grainMove{0%{transform:translate(0,0)}33%{transform:translate(-2%,1%)}66%{transform:translate(1%,-2%)}100%{transform:translate(0,0)}}

/* ── Vignette ── */
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(120,40,0,.2) 100%);pointer-events:none}

/* ── Title ── */
.title{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.3em;
  padding-bottom:8%;
}
.title-main{
  font-family:'Abril Fatface',serif;
  font-weight:400;
  font-size:clamp(2.5rem,9.5vw,7.5rem);
  color:#7a2020;
  letter-spacing:.08em;
  text-transform:uppercase;
  text-shadow:
    0 2px 0 rgba(255,255,255,.4),
    0 4px 20px rgba(200,80,40,.4),
    0 0 60px rgba(255,160,100,.3);
  opacity:0;
  animation:titleDrop 1.2s cubic-bezier(.34,1.56,.64,1) 1s forwards;
}
.title-badge{
  display:flex;align-items:center;gap:1em;
  opacity:0;
  animation:fadeUp .8s ease-out 2.2s forwards;
}
.title-badge span{
  font-family:'Josefin Sans',sans-serif;
  font-weight:700;
  font-size:clamp(.6rem,1.4vw,1rem);
  color:#c05030;
  letter-spacing:.4em;
  text-transform:uppercase;
}
.title-badge::before,.title-badge::after{
  content:'';display:block;
  width:clamp(30px,5vw,60px);height:1px;
  background:linear-gradient(90deg,transparent,#c05030,transparent);
}
@keyframes titleDrop{
  0%{opacity:0;transform:translateY(-30px) scale(1.05)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeUp{
  0%{opacity:0;transform:translateY(10px)}
  100%{opacity:1;transform:translateY(0)}
}

.label{position:absolute;bottom:3%;right:3%;font-family:monospace;font-size:clamp(.5rem,.9vw,.75rem);color:rgba(120,40,0,.4);letter-spacing:.15em}
</style>
</head>
<body>
<div class="stage">
  <div class="sky"></div>

  <!-- Clouds -->
  <div class="cloud" style="width:30%;height:20%;top:5%;left:-5%;animation-duration:22s;opacity:.8"></div>
  <div class="cloud" style="width:25%;height:15%;top:15%;left:-8%;animation-duration:28s;animation-delay:-10s;opacity:.6"></div>
  <div class="cloud" style="width:35%;height:18%;top:8%;left:-12%;animation-duration:18s;animation-delay:-6s;opacity:.7"></div>

  <!-- Moon/Sun -->
  <div class="moon-wrap">
    <div class="moon-rays"></div>
    <div class="moon-glow"></div>
    <div class="moon-body"></div>
  </div>

  <!-- Horizon -->
  <div class="horizon"></div>

  <!-- Hills silhouette -->
  <div class="hills">
    <svg viewBox="0 0 1200 300" preserveAspectRatio="none">
      <path d="M0,300 Q100,180 200,220 Q350,140 500,200 Q650,120 800,180 Q950,100 1100,160 Q1150,140 1200,150 L1200,300 Z" fill="rgba(180,80,60,.25)"/>
      <path d="M0,300 Q150,200 300,240 Q450,160 600,220 Q750,150 900,200 Q1050,130 1200,180 L1200,300 Z" fill="rgba(140,50,30,.2)"/>
    </svg>
  </div>

  <!-- Particles -->
  <div class="particle" style="width:6px;height:6px;top:30%;left:15%;animation-duration:4s;animation-delay:0s"></div>
  <div class="particle" style="width:4px;height:4px;top:45%;left:30%;animation-duration:5s;animation-delay:-1s"></div>
  <div class="particle" style="width:8px;height:8px;top:25%;left:70%;animation-duration:3.5s;animation-delay:-2s"></div>
  <div class="particle" style="width:5px;height:5px;top:55%;left:80%;animation-duration:6s;animation-delay:-.5s"></div>
  <div class="particle" style="width:4px;height:4px;top:35%;left:88%;animation-duration:4.5s;animation-delay:-3s"></div>

  <!-- Grain -->
  <div class="grain"></div>
  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Title -->
  <div class="title">
    <div class="title-main">Strawberry Moon</div>
    <div class="title-badge"><span>golden hour</span></div>
  </div>

  <div class="label">V3 · PEACH SUNRISE</div>
</div>
</body>
</html>
