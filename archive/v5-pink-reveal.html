<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STRAWBERRY MOON — V5 Pink Cloud Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────────
   STRAWBERRY MOON — V5 Pink Cloud Reveal
   Timeline (6 s):
   0.0 – 1.5 s  sky fades in, clouds cover scene
   1.5 – 3.5 s  clouds drift apart, moon glows through
   3.5 – 5.0 s  moon fully revealed, title rises
   5.0 – 6.0 s  hold / gentle breathe
   ───────────────────────────────────────────── */

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#1a0810;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

/* ── 16:9 stage ── */
.stage {
  position:relative;
  width: min(100vw, 177.78vh);
  height: min(56.25vw, 100vh);
  overflow:hidden;
  border-radius:4px;
}

/* ══════════════════════════════════════════
   SKY  — warm pink gradient, fades in
══════════════════════════════════════════ */
.sky {
  position:absolute; inset:0;
  background: linear-gradient(170deg,
    #fff0f5  0%,
    #ffd6e8 18%,
    #ffb3cc 38%,
    #ff8fab 58%,
    #f06080 78%,
    #c83060 100%);
  animation: skyFadeIn 1.4s ease-out both,
             skyBreathe 5s ease-in-out 1.4s infinite alternate;
}
@keyframes skyFadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes skyBreathe {
  0%   { filter: brightness(1)    saturate(1);   }
  100% { filter: brightness(1.06) saturate(1.08);}
}

/* ══════════════════════════════════════════
   MOON  — hidden behind clouds, glows in
══════════════════════════════════════════ */
.moon-wrap {
  position:absolute;
  /* centred, slightly above middle */
  top:50%; left:50%;
  transform: translate(-50%, -54%);
  width: 22%;
  aspect-ratio: 1;
  /* moon starts invisible, reveals as clouds part */
  animation: moonReveal 1.8s ease-out 2s forwards;
  opacity:0;
}
@keyframes moonReveal {
  0%   { opacity:0; transform: translate(-50%,-54%) scale(.85); }
  100% { opacity:1; transform: translate(-50%,-54%) scale(1);   }
}

/* outer halo */
.moon-halo {
  position:absolute; inset:-70%;
  border-radius:50%;
  background: radial-gradient(circle,
    rgba(255,200,220,.55)  0%,
    rgba(255,160,190,.25) 35%,
    rgba(255,130,160,.10) 60%,
    transparent 75%);
  filter: blur(12px);
  animation: haloPulse 3.5s ease-in-out infinite alternate;
}
@keyframes haloPulse {
  0%   { transform:scale(1);    opacity:.7; }
  100% { transform:scale(1.12); opacity:1;  }
}

/* moon body */
.moon {
  position:absolute; inset:0;
  border-radius:50%;
  background: radial-gradient(circle at 38% 33%,
    #fff8f8  0%,
    #ffe0ea 30%,
    #ffb3c6 60%,
    #ff7fa0 82%,
    #e8507a 100%);
  box-shadow:
    inset -8px -10px 24px rgba(200,50,90,.45),
    inset  6px  8px 18px rgba(255,255,255,.65),
    0 0  50px 22px rgba(255,130,160,.55),
    0 0 100px 50px rgba(255,100,140,.25);
  animation: moonGlow 3s ease-in-out infinite alternate;
}
@keyframes moonGlow {
  0%   { box-shadow: inset -8px -10px 24px rgba(200,50,90,.45), inset 6px 8px 18px rgba(255,255,255,.65), 0 0 50px 22px rgba(255,130,160,.55), 0 0 100px 50px rgba(255,100,140,.25); }
  100% { box-shadow: inset -8px -10px 24px rgba(200,50,90,.45), inset 6px 8px 18px rgba(255,255,255,.65), 0 0 70px 35px rgba(255,130,160,.75), 0 0 140px 70px rgba(255,100,140,.4);  }
}

/* moon float after reveal */
.moon-wrap { animation: moonReveal 1.8s ease-out 2s forwards; }
/* second animation layered via wrapper child */
.moon { animation: moonGlow 3s ease-in-out 3.8s infinite alternate; }

/* ══════════════════════════════════════════
   SPARKLES around moon
══════════════════════════════════════════ */
.sparkles {
  position:absolute; inset:0;
  pointer-events:none;
  opacity:0;
  animation: sparkleIn .8s ease-out 3.2s forwards;
}
@keyframes sparkleIn { to { opacity:1; } }

.sp {
  position:absolute;
  background:#fff;
  border-radius:50%;
  box-shadow: 0 0 6px 2px rgba(255,200,220,.9);
  animation: spTwinkle ease-in-out infinite;
}
@keyframes spTwinkle {
  0%,100% { opacity:.15; transform:scale(.6); }
  50%      { opacity:1;   transform:scale(1.4);}
}

/* ══════════════════════════════════════════
   CLOUDS  — the key animation
   Left cloud drifts LEFT, right cloud drifts RIGHT
   They start overlapping centre, then part to reveal moon
══════════════════════════════════════════ */

/* shared cloud shape helper */
.cloud-group {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
}

/* ── LEFT cloud bank ── */
.cloud-left {
  position:absolute;
  top:0; left:0;
  width:65%; height:100%;
  /* starts centred (translateX 0), drifts left */
  animation: cloudLeft 3s cubic-bezier(.4,0,.2,1) .6s forwards;
}
@keyframes cloudLeft {
  0%   { transform: translateX(0);    }
  100% { transform: translateX(-42%); }
}

/* ── RIGHT cloud bank ── */
.cloud-right {
  position:absolute;
  top:0; right:0;
  width:65%; height:100%;
  animation: cloudRight 3s cubic-bezier(.4,0,.2,1) .6s forwards;
}
@keyframes cloudRight {
  0%   { transform: translateX(0);   }
  100% { transform: translateX(42%);}
}

/* SVG cloud shapes inside each bank */
.cloud-left svg,
.cloud-right svg {
  width:100%; height:100%;
  display:block;
}

/* after parting, clouds continue slow drift */
.cloud-left  { animation: cloudLeft 3s cubic-bezier(.4,0,.2,1) .6s forwards,
                           cloudSlowLeft  8s linear 3.6s infinite; }
.cloud-right { animation: cloudRight 3s cubic-bezier(.4,0,.2,1) .6s forwards,
                           cloudSlowRight 8s linear 3.6s infinite; }
@keyframes cloudSlowLeft  { 0%{transform:translateX(-42%)} 100%{transform:translateX(-52%)} }
@keyframes cloudSlowRight { 0%{transform:translateX(42%)}  100%{transform:translateX(52%)}  }

/* ══════════════════════════════════════════
   BACKGROUND CLOUD WISPS (always drifting)
══════════════════════════════════════════ */
.wisp {
  position:absolute;
  border-radius:50%;
  background: radial-gradient(ellipse,
    rgba(255,255,255,.75) 0%,
    rgba(255,220,235,.45) 50%,
    transparent 80%);
  filter: blur(14px);
  animation: wispDrift linear infinite;
}
@keyframes wispDrift {
  from { transform: translateX(-15%); }
  to   { transform: translateX(115%); }
}

/* ══════════════════════════════════════════
   FILM GRAIN
══════════════════════════════════════════ */
.grain {
  position:absolute; inset:0;
  pointer-events:none;
  opacity:.13; mix-blend-mode:overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.5'/></svg>");
  animation: grainShift .65s steps(3) infinite;
}
@keyframes grainShift {
  0%   { transform:translate(0,0);    }
  33%  { transform:translate(-2%,1%); }
  66%  { transform:translate(1%,-2%);}
  100% { transform:translate(0,0);    }
}

/* ══════════════════════════════════════════
   VIGNETTE
══════════════════════════════════════════ */
.vignette {
  position:absolute; inset:0;
  background: radial-gradient(ellipse at center,
    transparent 48%,
    rgba(160,30,60,.28) 100%);
  pointer-events:none;
}

/* ══════════════════════════════════════════
   TITLE  — Abril Fatface, ALL CAPS, bold
   rises up after moon is revealed
══════════════════════════════════════════ */
.title-wrap {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:.3em;
  /* push text below moon centre */
  padding-top:28%;
  pointer-events:none;
}

.title-main {
  font-family: 'Abril Fatface', serif;
  font-weight: 400;           /* Abril Fatface is inherently heavy */
  font-size: clamp(2.2rem, 8.5vw, 7rem);
  color: #fff;
  text-transform: uppercase;
  letter-spacing: .1em;
  text-shadow:
    0  2px  0  rgba(255,255,255,.35),
    0  4px 24px rgba(200,50,90,.5),
    0  0   60px rgba(255,130,160,.35);
  opacity:0;
  transform: translateY(28px) scale(.96);
  animation: titleRise 1.3s cubic-bezier(.16,1,.3,1) 3.6s forwards;
}

.title-sub {
  font-family: 'Abril Fatface', serif;
  font-size: clamp(.6rem, 1.6vw, 1.1rem);
  color: rgba(255,240,245,.75);
  letter-spacing: .55em;
  text-transform: uppercase;
  opacity:0;
  animation: titleRise .9s ease-out 4.6s forwards;
}

@keyframes titleRise {
  0%   { opacity:0; transform:translateY(28px) scale(.96); }
  100% { opacity:1; transform:translateY(0)    scale(1);   }
}

/* ── version label ── */
.label {
  position:absolute; bottom:3%; right:3%;
  font-family:monospace;
  font-size:clamp(.45rem,.85vw,.7rem);
  color:rgba(255,255,255,.3);
  letter-spacing:.15em;
}

/* ── accessibility ── */
@media (prefers-reduced-motion:reduce) {
  *, *::before, *::after { animation:none !important; opacity:1 !important; transform:none !important; }
}
</style>
</head>
<body>
<div class="stage">

  <!-- Sky -->
  <div class="sky"></div>

  <!-- Background wisps (always moving) -->
  <div class="wisp" style="width:40%;height:22%;top:5%;left:-5%;animation-duration:26s;opacity:.6"></div>
  <div class="wisp" style="width:30%;height:16%;top:60%;left:-8%;animation-duration:32s;animation-delay:-12s;opacity:.5"></div>
  <div class="wisp" style="width:35%;height:18%;top:75%;left:-10%;animation-duration:22s;animation-delay:-6s;opacity:.55"></div>
  <div class="wisp" style="width:25%;height:14%;top:40%;left:-6%;animation-duration:28s;animation-delay:-18s;opacity:.4"></div>

  <!-- Moon (behind clouds in z-order) -->
  <div class="moon-wrap">
    <div class="moon-halo"></div>
    <div class="moon"></div>
  </div>

  <!-- Sparkles around moon -->
  <div class="sparkles" id="sparkles"></div>

  <!-- LEFT cloud bank -->
  <div class="cloud-left">
    <svg viewBox="0 0 780 675" preserveAspectRatio="xMaxYMid slice">
      <defs>
        <radialGradient id="cL1" cx="60%" cy="50%" r="55%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".98"/>
          <stop offset="55%"  stop-color="#ffe8f0" stop-opacity=".85"/>
          <stop offset="100%" stop-color="#ffd0e4" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="cL2" cx="55%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".95"/>
          <stop offset="60%"  stop-color="#fff0f5" stop-opacity=".7"/>
          <stop offset="100%" stop-color="#ffd6e8" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="cL3" cx="65%" cy="50%" r="52%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".9"/>
          <stop offset="50%"  stop-color="#ffe4ee" stop-opacity=".75"/>
          <stop offset="100%" stop-color="#ffcce0" stop-opacity="0"/>
        </radialGradient>
        <filter id="blur1"><feGaussianBlur stdDeviation="6"/></filter>
        <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
      </defs>

      <!-- big fluffy cloud top-left -->
      <g filter="url(#blur1)">
        <ellipse cx="260" cy="160" rx="280" ry="130" fill="url(#cL1)"/>
        <ellipse cx="180" cy="200" rx="200" ry="100" fill="url(#cL2)"/>
        <ellipse cx="350" cy="130" rx="220" ry="90"  fill="url(#cL1)"/>
        <ellipse cx="100" cy="170" rx="160" ry="80"  fill="url(#cL3)"/>
      </g>

      <!-- mid cloud -->
      <g filter="url(#blur1)">
        <ellipse cx="300" cy="360" rx="320" ry="140" fill="url(#cL2)"/>
        <ellipse cx="200" cy="400" rx="240" ry="110" fill="url(#cL1)"/>
        <ellipse cx="420" cy="330" rx="260" ry="110" fill="url(#cL3)"/>
      </g>

      <!-- bottom cloud -->
      <g filter="url(#blur2)">
        <ellipse cx="250" cy="580" rx="350" ry="160" fill="url(#cL1)"/>
        <ellipse cx="150" cy="620" rx="260" ry="120" fill="url(#cL2)"/>
        <ellipse cx="400" cy="560" rx="280" ry="120" fill="url(#cL3)"/>
      </g>
    </svg>
  </div>

  <!-- RIGHT cloud bank -->
  <div class="cloud-right">
    <svg viewBox="0 0 780 675" preserveAspectRatio="xMinYMid slice">
      <defs>
        <radialGradient id="cR1" cx="40%" cy="50%" r="55%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".98"/>
          <stop offset="55%"  stop-color="#ffe8f0" stop-opacity=".85"/>
          <stop offset="100%" stop-color="#ffd0e4" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="cR2" cx="45%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".95"/>
          <stop offset="60%"  stop-color="#fff0f5" stop-opacity=".7"/>
          <stop offset="100%" stop-color="#ffd6e8" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="cR3" cx="35%" cy="50%" r="52%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".9"/>
          <stop offset="50%"  stop-color="#ffe4ee" stop-opacity=".75"/>
          <stop offset="100%" stop-color="#ffcce0" stop-opacity="0"/>
        </radialGradient>
        <filter id="blurR1"><feGaussianBlur stdDeviation="6"/></filter>
        <filter id="blurR2"><feGaussianBlur stdDeviation="10"/></filter>
      </defs>

      <!-- big fluffy cloud top-right -->
      <g filter="url(#blurR1)">
        <ellipse cx="520" cy="160" rx="280" ry="130" fill="url(#cR1)"/>
        <ellipse cx="600" cy="200" rx="200" ry="100" fill="url(#cR2)"/>
        <ellipse cx="430" cy="130" rx="220" ry="90"  fill="url(#cR1)"/>
        <ellipse cx="680" cy="170" rx="160" ry="80"  fill="url(#cR3)"/>
      </g>

      <!-- mid cloud -->
      <g filter="url(#blurR1)">
        <ellipse cx="480" cy="360" rx="320" ry="140" fill="url(#cR2)"/>
        <ellipse cx="580" cy="400" rx="240" ry="110" fill="url(#cR1)"/>
        <ellipse cx="360" cy="330" rx="260" ry="110" fill="url(#cR3)"/>
      </g>

      <!-- bottom cloud -->
      <g filter="url(#blurR2)">
        <ellipse cx="530" cy="580" rx="350" ry="160" fill="url(#cR1)"/>
        <ellipse cx="630" cy="620" rx="260" ry="120" fill="url(#cR2)"/>
        <ellipse cx="380" cy="560" rx="280" ry="120" fill="url(#cR3)"/>
      </g>
    </svg>
  </div>

  <!-- Film grain -->
  <div class="grain"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Title -->
  <div class="title-wrap">
    <div class="title-main">Strawberry Moon</div>
    <div class="title-sub">✦ &nbsp; a dreamy channel &nbsp; ✦</div>
  </div>

  <div class="label">V5 · PINK CLOUD REVEAL</div>
</div>

<script>
// Sparkle dots around moon area
const sp = document.getElementById('sparkles');
const cx = 50, cy = 46; // moon centre in %
const positions = [
  {r:16,a:30},{r:18,a:75},{r:15,a:130},{r:17,a:190},
  {r:19,a:240},{r:16,a:290},{r:18,a:340},{r:14,a:10},
  {r:20,a:110},{r:15,a:165},{r:17,a:215},{r:19,a:265}
];
positions.forEach(({r,a},i)=>{
  const rad = a * Math.PI/180;
  const x = cx + r * Math.cos(rad);
  const y = cy + r * Math.sin(rad) * .56; // aspect correction
  const size = (Math.random()*3+1.5).toFixed(1);
  const d = document.createElement('div');
  d.className='sp';
  d.style.cssText=`
    width:${size}px;height:${size}px;
    left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;
    animation-duration:${(1.8+Math.random()*2).toFixed(2)}s;
    animation-delay:${(Math.random()*2).toFixed(2)}s;
  `;
  sp.appendChild(d);
});
</script>
</body>
</html>
