<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STRAWBERRY MOON — V4 Mint Celestial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050d0a;display:flex;align-items:center;justify-content:center}

.stage{
  position:relative;
  width:min(100vw,177.78vh);
  height:min(56.25vw,100vh);
  overflow:hidden;
}

/* ── Sky ── */
.sky{
  position:absolute;inset:0;
  background:linear-gradient(150deg,
    #0a1628 0%,
    #0d2a20 20%,
    #0f3830 40%,
    #1a4a3a 55%,
    #2d6b50 70%,
    #4a9070 85%,
    #7abfa0 100%);
  animation:skyBreath 6s ease-in-out infinite alternate;
}
@keyframes skyBreath{
  0%{filter:brightness(1) hue-rotate(0deg)}
  100%{filter:brightness(1.1) hue-rotate(-8deg)}
}

/* ── Nebula clouds ── */
.nebula{
  position:absolute;
  border-radius:50%;
  filter:blur(40px);
  mix-blend-mode:screen;
  animation:nebulaFloat ease-in-out infinite alternate;
}
@keyframes nebulaFloat{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.08) translate(2%,-2%)}}

/* ── Moon ── */
.moon-wrap{
  position:absolute;
  top:10%;right:15%;
  width:18%;aspect-ratio:1;
  animation:moonAppear 2s ease-out .3s both, moonBob 6s ease-in-out 2s infinite;
}
@keyframes moonAppear{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes moonBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3%)}}

.moon-ring{
  position:absolute;inset:-25%;
  border-radius:50%;
  border:1px solid rgba(150,255,200,.2);
  animation:ringPulse 4s ease-in-out infinite;
}
.moon-ring-2{
  position:absolute;inset:-45%;
  border-radius:50%;
  border:1px solid rgba(150,255,200,.1);
  animation:ringPulse 4s ease-in-out infinite;
  animation-delay:-2s;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.05);opacity:1}}

.moon-glow{
  position:absolute;inset:-60%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(150,255,200,.35) 0%,rgba(100,200,160,.15) 40%,transparent 70%);
  filter:blur(8px);
  animation:glowPulse 3.5s ease-in-out infinite alternate;
}
@keyframes glowPulse{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.1)}}

.moon-body{
  position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#f0fff8 0%,#c8f0e0 30%,#80d8b0 60%,#40b888 80%,#208860 100%);
  box-shadow:
    inset -6px -8px 20px rgba(20,100,60,.5),
    inset 5px 6px 15px rgba(200,255,230,.6),
    0 0 40px 15px rgba(100,220,160,.4),
    0 0 80px 40px rgba(80,180,130,.2);
}

/* ── Constellation lines ── */
.constellation{
  position:absolute;inset:0;
  pointer-events:none;
  opacity:0;
  animation:constellationFade 1.5s ease-out 1.5s forwards;
}
@keyframes constellationFade{from{opacity:0}to{opacity:1}}

/* ── Stars ── */
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:starTwinkle ease-in-out infinite}
.star.mint{background:#a0ffdc}
.star.rose{background:#ffb0c8}
@keyframes starTwinkle{0%,100%{opacity:.1;transform:scale(.6)}50%{opacity:1;transform:scale(1.4)}}

/* ── Floating dust ── */
.dust{
  position:absolute;
  width:2px;height:2px;
  border-radius:50%;
  background:rgba(150,255,200,.6);
  animation:dustFloat linear infinite;
}
@keyframes dustFloat{
  0%{transform:translateY(100%) translateX(0);opacity:0}
  10%{opacity:.8}
  90%{opacity:.4}
  100%{transform:translateY(-10%) translateX(20px);opacity:0}
}

/* ── Grain ── */
.grain{
  position:absolute;inset:0;pointer-events:none;
  opacity:.12;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.5'/></svg>");
  animation:grainMove .7s steps(3) infinite;
}
@keyframes grainMove{0%{transform:translate(0,0)}33%{transform:translate(-2%,1%)}66%{transform:translate(1%,-2%)}100%{transform:translate(0,0)}}

/* ── Vignette ── */
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,10,8,.7) 100%);pointer-events:none}

/* ── Title ── */
.title{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  padding-left:8%;
  gap:.4em;
}
.title-eyebrow{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:clamp(.5rem,1.2vw,.9rem);
  color:rgba(150,255,200,.7);
  letter-spacing:.5em;
  text-transform:uppercase;
  opacity:0;
  animation:slideRight .8s ease-out .8s forwards;
}
.title-main{
  font-family:'DM Serif Display',serif;
  font-weight:400;
  font-size:clamp(2.5rem,9vw,7rem);
  color:transparent;
  background:linear-gradient(135deg,#a0ffdc 0%,#e0fff0 30%,#ffffff 50%,#ffd0e8 75%,#ff90b8 100%);
  -webkit-background-clip:text;
  background-clip:text;
  letter-spacing:.06em;
  line-height:1;
  filter:drop-shadow(0 0 25px rgba(100,255,180,.5)) drop-shadow(0 0 50px rgba(100,200,150,.3));
  opacity:0;
  animation:slideRight 1.2s cubic-bezier(.16,1,.3,1) 1.2s forwards;
}
.title-accent{
  display:flex;align-items:center;gap:.8em;
  opacity:0;
  animation:slideRight .8s ease-out 2.2s forwards;
}
.title-accent-line{
  width:clamp(40px,6vw,80px);height:1px;
  background:linear-gradient(90deg,rgba(150,255,200,.8),transparent);
}
.title-accent span{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:clamp(.5rem,1.1vw,.85rem);
  color:rgba(150,255,200,.6);
  letter-spacing:.35em;
  text-transform:uppercase;
}
@keyframes slideRight{
  0%{opacity:0;transform:translateX(-20px)}
  100%{opacity:1;transform:translateX(0)}
}

.label{position:absolute;bottom:3%;right:3%;font-family:monospace;font-size:clamp(.5rem,.9vw,.75rem);color:rgba(150,255,200,.25);letter-spacing:.15em}
</style>
</head>
<body>
<div class="stage">
  <div class="sky"></div>

  <!-- Nebula -->
  <div class="nebula" style="width:50%;height:50%;top:-10%;left:-10%;background:radial-gradient(circle,rgba(80,200,150,.15) 0%,transparent 70%);animation-duration:8s"></div>
  <div class="nebula" style="width:40%;height:40%;top:40%;right:-5%;background:radial-gradient(circle,rgba(100,150,255,.1) 0%,transparent 70%);animation-duration:11s;animation-delay:-4s"></div>
  <div class="nebula" style="width:35%;height:35%;bottom:-5%;left:30%;background:radial-gradient(circle,rgba(200,100,255,.08) 0%,transparent 70%);animation-duration:9s;animation-delay:-6s"></div>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Constellation SVG -->
  <div class="constellation">
    <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 1200 675">
      <g stroke="rgba(150,255,200,.25)" stroke-width=".5" fill="none">
        <line x1="200" y1="100" x2="280" y2="150"/>
        <line x1="280" y1="150" x2="350" y2="120"/>
        <line x1="350" y1="120" x2="420" y2="180"/>
        <line x1="900" y1="80" x2="960" y2="130"/>
        <line x1="960" y1="130" x2="1020" y2="90"/>
        <line x1="1020" y1="90" x2="1080" y2="140"/>
        <line x1="100" y1="300" x2="160" y2="260"/>
        <line x1="160" y1="260" x2="220" y2="310"/>
      </g>
      <g fill="rgba(150,255,200,.6)">
        <circle cx="200" cy="100" r="2"/>
        <circle cx="280" cy="150" r="1.5"/>
        <circle cx="350" cy="120" r="2"/>
        <circle cx="420" cy="180" r="1.5"/>
        <circle cx="900" cy="80" r="2"/>
        <circle cx="960" cy="130" r="1.5"/>
        <circle cx="1020" cy="90" r="2"/>
        <circle cx="1080" cy="140" r="1.5"/>
        <circle cx="100" cy="300" r="2"/>
        <circle cx="160" cy="260" r="1.5"/>
        <circle cx="220" cy="310" r="2"/>
      </g>
    </svg>
  </div>

  <!-- Moon -->
  <div class="moon-wrap">
    <div class="moon-ring-2"></div>
    <div class="moon-ring"></div>
    <div class="moon-glow"></div>
    <div class="moon-body"></div>
  </div>

  <!-- Dust particles -->
  <div class="dust" style="left:20%;animation-duration:8s;animation-delay:0s"></div>
  <div class="dust" style="left:35%;animation-duration:10s;animation-delay:-2s;background:rgba(255,180,200,.6)"></div>
  <div class="dust" style="left:55%;animation-duration:7s;animation-delay:-4s"></div>
  <div class="dust" style="left:70%;animation-duration:9s;animation-delay:-1s;background:rgba(200,180,255,.6)"></div>
  <div class="dust" style="left:85%;animation-duration:11s;animation-delay:-3s"></div>

  <!-- Grain -->
  <div class="grain"></div>
  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Title -->
  <div class="title">
    <div class="title-eyebrow">✦ &nbsp; channel</div>
    <div class="title-main">Strawberry<br>Moon</div>
    <div class="title-accent">
      <div class="title-accent-line"></div>
      <span>celestial vibes</span>
    </div>
  </div>

  <div class="label">V4 · MINT CELESTIAL</div>
</div>

<script>
const starsEl = document.getElementById('stars');
const colors = ['#fff','#fff','#fff','#a0ffdc','#ffb0c8','#d0c8ff'];
for(let i=0;i<100;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2.5+.5;
  const c=colors[Math.floor(Math.random()*colors.length)];
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:${c};animation-delay:${Math.random()*4}s;animation-duration:${1.5+Math.random()*3}s`;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
