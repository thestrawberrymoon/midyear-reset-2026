<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STRAWBERRY MOON — V2 Lavender Dusk</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0d0a1a;display:flex;align-items:center;justify-content:center}

.stage{
  position:relative;
  width:min(100vw,177.78vh);
  height:min(56.25vw,100vh);
  overflow:hidden;
}

/* ── Sky layers ── */
.sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    #1a0a2e 0%,
    #2d1b4e 20%,
    #4a2060 40%,
    #7b3f7a 60%,
    #c4688a 80%,
    #f0a0a8 95%,
    #ffd4d8 100%);
  animation:skyPulse 6s ease-in-out infinite alternate;
}
@keyframes skyPulse{
  0%{filter:brightness(1) hue-rotate(0deg)}
  100%{filter:brightness(1.08) hue-rotate(5deg)}
}

/* ── Horizon glow ── */
.horizon{
  position:absolute;
  bottom:0;left:0;right:0;
  height:35%;
  background:linear-gradient(0deg,rgba(255,160,180,.6) 0%,rgba(255,180,200,.3) 40%,transparent 100%);
  filter:blur(20px);
  animation:horizonPulse 4s ease-in-out infinite alternate;
}
@keyframes horizonPulse{0%{opacity:.7}100%{opacity:1}}

/* ── Moon ── */
.moon-container{
  position:absolute;
  top:15%;left:50%;
  transform:translateX(-50%);
  width:16%;aspect-ratio:1;
  animation:moonRise 6s ease-out both, moonFloat 5s ease-in-out 1s infinite;
}
@keyframes moonRise{from{transform:translateX(-50%) translateY(30%);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes moonFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3%)}}

.moon-halo{
  position:absolute;inset:-80%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,180,200,.4) 0%,rgba(200,120,180,.2) 30%,rgba(150,80,160,.1) 60%,transparent 75%);
  animation:haloBreath 3s ease-in-out infinite alternate;
}
@keyframes haloBreath{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.1);opacity:1}}

.moon-body{
  position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#fff8ff 0%,#f0c8e8 35%,#d890c0 65%,#c060a0 85%,#a03080 100%);
  box-shadow:
    inset -8px -10px 25px rgba(160,48,128,.5),
    inset 6px 8px 18px rgba(255,240,255,.6),
    0 0 50px 20px rgba(200,100,180,.5),
    0 0 100px 50px rgba(180,80,160,.25);
}

/* ── Aurora bands ── */
.aurora{
  position:absolute;
  left:0;right:0;
  height:25%;
  border-radius:50%;
  filter:blur(30px);
  mix-blend-mode:screen;
  animation:auroraWave ease-in-out infinite alternate;
}
.aurora-1{top:25%;background:linear-gradient(90deg,transparent,rgba(180,100,220,.4),rgba(100,180,255,.3),transparent);animation-duration:7s;animation-delay:0s}
.aurora-2{top:35%;background:linear-gradient(90deg,transparent,rgba(255,100,180,.3),rgba(180,100,255,.4),transparent);animation-duration:9s;animation-delay:-3s}
.aurora-3{top:45%;background:linear-gradient(90deg,transparent,rgba(100,220,200,.2),rgba(255,150,200,.3),transparent);animation-duration:11s;animation-delay:-5s}
@keyframes auroraWave{0%{transform:scaleX(1) translateX(-5%);opacity:.5}100%{transform:scaleX(1.1) translateX(5%);opacity:.9}}

/* ── Stars ── */
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:starTwinkle ease-in-out infinite}
@keyframes starTwinkle{0%,100%{opacity:.1;transform:scale(.6)}50%{opacity:1;transform:scale(1.4)}}

/* ── Floating orbs ── */
.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(15px);
  animation:orbFloat ease-in-out infinite;
  mix-blend-mode:screen;
}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8%) scale(1.05)}}

/* ── Grain ── */
.grain{
  position:absolute;inset:0;pointer-events:none;
  opacity:.1;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.5'/></svg>");
  animation:grainMove .7s steps(3) infinite;
}
@keyframes grainMove{0%{transform:translate(0,0)}33%{transform:translate(-2%,1%)}66%{transform:translate(1%,-2%)}100%{transform:translate(0,0)}}

/* ── Vignette ── */
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(10,0,30,.6) 100%);pointer-events:none}

/* ── Title ── */
.title{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.5em;
}
.title-main{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:clamp(2rem,8vw,6.5rem);
  color:transparent;
  background:linear-gradient(135deg,#fff 0%,#f8d0e8 30%,#e8a0d0 60%,#d070b8 100%);
  -webkit-background-clip:text;
  background-clip:text;
  letter-spacing:.18em;
  text-transform:uppercase;
  text-shadow:none;
  filter:drop-shadow(0 0 30px rgba(220,120,200,.8)) drop-shadow(0 0 60px rgba(180,80,180,.4));
  opacity:0;
  animation:titleGlow 1.6s cubic-bezier(.16,1,.3,1) 1.2s forwards;
}
.title-line{
  width:40%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(220,160,220,.7),transparent);
  opacity:0;
  animation:lineExpand 1s ease-out 2.4s forwards;
}
.title-sub{
  font-family:'Cormorant Garamond',serif;
  font-weight:700;
  font-size:clamp(.7rem,1.6vw,1.2rem);
  color:rgba(240,200,240,.8);
  letter-spacing:.6em;
  text-transform:uppercase;
  opacity:0;
  animation:titleGlow .8s ease-out 2.8s forwards;
}
@keyframes titleGlow{
  0%{opacity:0;transform:scale(.9) translateY(15px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes lineExpand{
  0%{opacity:0;transform:scaleX(0)}
  100%{opacity:1;transform:scaleX(1)}
}

.label{position:absolute;bottom:3%;right:3%;font-family:monospace;font-size:clamp(.5rem,.9vw,.75rem);color:rgba(255,255,255,.3);letter-spacing:.15em}
</style>
</head>
<body>
<div class="stage">
  <div class="sky"></div>
  <div class="horizon"></div>

  <!-- Aurora -->
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Floating orbs -->
  <div class="orb" style="width:12%;height:12%;top:30%;left:15%;background:rgba(200,100,255,.3);animation-duration:8s"></div>
  <div class="orb" style="width:8%;height:8%;top:50%;left:75%;background:rgba(255,120,200,.25);animation-duration:6s;animation-delay:-3s"></div>
  <div class="orb" style="width:6%;height:6%;top:20%;left:80%;background:rgba(150,200,255,.2);animation-duration:10s;animation-delay:-5s"></div>

  <!-- Moon -->
  <div class="moon-container">
    <div class="moon-halo"></div>
    <div class="moon-body"></div>
  </div>

  <!-- Grain -->
  <div class="grain"></div>
  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Title -->
  <div class="title">
    <div class="title-main">Strawberry Moon</div>
    <div class="title-line"></div>
    <div class="title-sub">✦ &nbsp; celestial &nbsp; ✦</div>
  </div>

  <div class="label">V2 · LAVENDER DUSK</div>
</div>

<script>
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2.5+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*70}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${1.5+Math.random()*3}s`;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
